pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{js,ts,tsx,astro,css,json,md}"
      stage_fixed: true
      run: pnpm prettier --write {staged_files}
    eslint:
      glob: "*.{js,ts,tsx,astro}"
      stage_fixed: true
      run: pnpm eslint --fix {staged_files}
    emdash:
      glob: "*.{md,mdx,json}"
      stage_fixed: true
      run: sed -i 's/ — / - /g' {staged_files}
